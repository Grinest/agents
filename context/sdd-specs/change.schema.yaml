# Schema: change.yaml
# Definicion formal de cada campo del archivo change.yaml (especificacion de cambio incremental SDD).
# Este archivo describe el formato esperado para que el subagent product genere specs de cambio validas.
# Un change.yaml representa un cambio incremental a una funcionalidad existente (feature.yaml).
# Todos los campos son OBLIGATORIOS salvo que se indique lo contrario.

schema:
  change_id:
    tipo: string
    obligatorio: true
    descripcion: Identificador unico del cambio en kebab-case. Debe coincidir con el nombre del subdirectorio en changes/.
    reglas:
      - Usar kebab-case (ej. v1-email-validation, v2-bulk-export, v1-retry-logic)
      - Debe ser descriptivo y unico dentro de la feature
      - Prefijo con version (v1-, v2-) para indicar iteracion
      - No incluir el nombre de la feature como prefijo
    ejemplo: v1-bulk-import

  feature:
    tipo: string
    obligatorio: true
    descripcion: Nombre de la funcionalidad padre en snake_case. Debe coincidir con el campo feature del feature.yaml padre.
    reglas:
      - Usar snake_case, identico al feature.yaml padre
      - El feature.yaml padre DEBE existir antes de crear el change.yaml
      - Sirve como referencia para mantener trazabilidad feature-cambio
    ejemplo: warehouse_inventory_management

  title:
    tipo: string
    obligatorio: true
    descripcion: Titulo descriptivo del cambio en lenguaje de negocio.
    reglas:
      - Debe describir el cambio de forma clara y concisa
      - Usar lenguaje de negocio, NUNCA jerga tecnica
      - Debe ser comprensible para cualquier stakeholder no tecnico
      - Maximo 100 caracteres
    ejemplo: Importacion masiva de movimientos de inventario via archivo CSV

  status:
    tipo: enum
    obligatorio: true
    descripcion: Estado actual del cambio dentro del ciclo de vida.
    valores_permitidos:
      - planned
      - in-progress
      - completed
      - cancelled
    reglas:
      - Al crear un change.yaml nuevo, siempre iniciar en planned
      - Transiciones validas: planned → in-progress → completed | cancelled
    ejemplo: planned

  scope:
    tipo: objeto
    obligatorio: true
    descripcion: Alcance del cambio con descripcion, elementos incluidos y excluidos.
    campos:
      description:
        tipo: string (multilinea)
        obligatorio: true
        descripcion: Descripcion del cambio en lenguaje de negocio.
        reglas:
          - Describir que cambia respecto a la funcionalidad existente
          - Usar lenguaje de negocio, sin detalles tecnicos
          - Debe ser comprensible para stakeholders no tecnicos
      in_scope:
        tipo: lista de strings
        obligatorio: true
        descripcion: Elementos que estan dentro del alcance del cambio.
        reglas:
          - Minimo 2 elementos
          - Cada elemento debe ser concreto y verificable
          - Usar lenguaje de negocio
      out_of_scope:
        tipo: lista de strings
        obligatorio: true
        descripcion: Elementos explicitamente excluidos del alcance del cambio.
        reglas:
          - Minimo 1 elemento
          - Incluir elementos que podrian confundirse como parte del cambio
          - Ayuda a delimitar expectativas
    ejemplo:
      description: |
        Permitir al administrador de almacen importar movimientos de inventario
        de forma masiva mediante la carga de un archivo CSV, en lugar de registrar
        cada movimiento individualmente.
      in_scope:
        - Carga de archivo CSV con movimientos de inventario
        - Validacion de formato y datos del archivo
        - Registro masivo de movimientos en el sistema
        - Reporte de errores por fila del archivo
      out_of_scope:
        - Exportacion de movimientos a CSV
        - Soporte de formatos distintos a CSV (Excel, JSON)

  acceptance_criteria:
    tipo: lista de strings
    obligatorio: true
    descripcion: Condiciones verificables que deben cumplirse para considerar el cambio como terminado.
    reglas:
      - Minimo 3 criterios
      - Cada criterio debe ser verificable y objetivo (se puede responder si/no)
      - No mencionar tecnologias, frameworks ni detalles de implementacion
      - Escritos desde la perspectiva del usuario o del comportamiento del sistema
      - Usar verbos en presente ("El sistema muestra...", "El usuario puede...")
      - Deben ser especificos al cambio, no repetir criterios del feature.yaml padre
    ejemplo:
      - El administrador puede cargar un archivo CSV con movimientos de inventario
      - El sistema valida el formato del archivo antes de procesar los movimientos
      - El sistema muestra un reporte con el detalle de filas procesadas y filas con error
      - El sistema rechaza archivos que excedan el limite de filas permitido

  dependencies:
    tipo: objeto
    obligatorio: false
    descripcion: Dependencias del cambio con otras features o sistemas externos.
    campos:
      features:
        tipo: lista de objetos
        obligatorio: false
        descripcion: Features de las que depende este cambio.
        campos_por_item:
          feature:
            tipo: string
            descripcion: Nombre de la feature en snake_case
          status:
            tipo: string
            descripcion: Estado requerido de la feature (ej. completed, in-progress)
      external:
        tipo: lista de strings
        obligatorio: false
        descripcion: Dependencias externas al sistema.
    ejemplo:
      features:
        - feature: warehouse_inventory_management
          status: completed
      external:
        - Servicio de almacenamiento de archivos temporales

  risks:
    tipo: lista de objetos
    obligatorio: false
    descripcion: Riesgos identificados para el cambio con sus estrategias de mitigacion.
    campos_por_item:
      description:
        tipo: string
        descripcion: Descripcion del riesgo en lenguaje de negocio
      mitigation:
        tipo: string
        descripcion: Estrategia para mitigar o reducir el impacto del riesgo
    reglas:
      - Cada riesgo debe tener descripcion y mitigacion
      - Enfocarse en riesgos de producto, no tecnicos
    ejemplo:
      - description: Archivos CSV con formato incorrecto podrian generar movimientos erroneos
        mitigation: Validacion estricta de formato y datos antes de procesar cualquier fila

  affected_repos:
    tipo: lista de strings
    obligatorio: true
    descripcion: Repositorios del proyecto que se ven afectados por este cambio.
    reglas:
      - Minimo 1 repositorio
      - Usar el nombre del repositorio tal como aparece en el sistema de control de versiones
      - Incluir todos los repositorios que requieren modificaciones
    ejemplo:
      - warehouse-api
      - warehouse-web

  metadata:
    tipo: objeto
    obligatorio: true
    descripcion: Metadatos del cambio para trazabilidad y priorizacion.
    campos:
      created_by:
        tipo: string
        obligatorio: true
        descripcion: Nombre o rol de quien solicita el cambio
      created_at:
        tipo: string (fecha)
        obligatorio: true
        descripcion: Fecha de creacion en formato ISO 8601 (YYYY-MM-DD)
      target_date:
        tipo: string (fecha)
        obligatorio: true
        descripcion: Fecha objetivo de entrega en formato ISO 8601 (YYYY-MM-DD)
      priority:
        tipo: enum
        obligatorio: true
        descripcion: Nivel de prioridad del cambio
        valores_permitidos:
          - low
          - medium
          - high
          - critical
    ejemplo:
      created_by: product_owner
      created_at: "2025-01-15"
      target_date: "2025-02-15"
      priority: high

# Reglas generales de redaccion:
#   - Todo el contenido debe estar en ESPANOL
#   - Usar lenguaje de negocio, nunca jerga tecnica
#   - Los valores deben ser concretos y medibles
#   - No inventar datos que no hayan sido proporcionados por el usuario
#   - El feature.yaml padre DEBE existir antes de crear un change.yaml
#   - Al crear un change.yaml, el feature.yaml padre debe ser actualizado (incrementar version)

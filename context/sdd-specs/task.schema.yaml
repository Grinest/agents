# Schema: task.yaml
# Definicion formal de cada campo del archivo de tarea (task.yaml) en la metodologia SDD.
# Este archivo describe el formato esperado para que el subagent @architect genere tareas validas
# y para que los sub-agentes de desarrollo las ejecuten sin ambiguedad.

schema:
  task:
    tipo: string
    obligatorio: true
    descripcion: Identificador unico de la tarea en snake_case.
    reglas:
      - Usar snake_case (ej. create_user_endpoint, implement_auth_service)
      - Debe ser corto, descriptivo y unico dentro de la funcionalidad
    ejemplo: create_notifications_table

  id:
    tipo: string
    obligatorio: false
    descripcion: Identificador alfanumerico de la tarea (opcional).
    reglas:
      - Formato TASK-NNN o similar
    ejemplo: TASK-001

  level:
    tipo: string (enum)
    obligatorio: true
    descripcion: Nivel de complejidad y alcance de la tarea.
    valores_permitidos:
      - L1: Tarea simple, un solo archivo, sin dependencias externas
      - L2: Tarea moderada, 2-3 archivos, dependencias internas
      - L3: Tarea compleja, multiples archivos, integracion entre capas
      - L4: Tarea critica, cambios cross-cutting, impacto en multiples dominios
      - L5: Tarea de alto riesgo, cambios de infraestructura o arquitectura base
    ejemplo: L2

  parent:
    tipo: string
    obligatorio: true
    descripcion: Referencia al archivo technical.yaml que define esta funcionalidad.
    ejemplo: technical.yaml

  status:
    tipo: string (enum)
    obligatorio: true
    descripcion: Estado actual de la tarea.
    valores_permitidos:
      - PENDING
      - IN_PROGRESS
      - COMPLETED
      - BLOCKED
    ejemplo: PENDING

  phase:
    tipo: string
    obligatorio: false
    descripcion: Fase del desarrollo a la que pertenece la tarea.
    ejemplo: "1 - Foundation"

  depends_on:
    tipo: lista de strings
    obligatorio: false
    descripcion: Lista de identificadores de tareas (campo task) que deben completarse antes.
    ejemplo:
      - create_domain_models
      - create_migrations

  assigned_subagent:
    tipo: string
    obligatorio: false
    descripcion: Sub-agente responsable de ejecutar la tarea (formato plugin:agent).
    ejemplo: "python-development:backend-py"

  scope:
    tipo: string (multilinea)
    obligatorio: true
    descripcion: Descripcion detallada del alcance tecnico de la tarea.
    reglas:
      - Explicar claramente QUE se debe hacer
      - Mencionar componentes involucrados
      - No incluir codigo de implementacion
    ejemplo: |
      Implementar la tabla de notificaciones en PostgreSQL usando SQLAlchemy.
      La tabla debe incluir campos para id, destinatario_id, titulo, cuerpo y timestamp.
      Asegurar que existan los indices correctos para busqueda por destinatario.

  files_to_create:
    tipo: lista de strings
    obligatorio: false
    descripcion: Lista de rutas de archivos que esta tarea debe crear.
    ejemplo:
      - app/infrastructure/repositories/sql_notification_repository.py
      - tests/unit/test_repository.py

  files_to_modify:
    tipo: lista de objetos
    obligatorio: false
    descripcion: Lista de archivos existentes que la funcionalidad requiere modificar.
    campos:
      path:
        tipo: string
        descripcion: Ruta relativa del archivo
      change:
        tipo: string
        descripcion: Descripcion del cambio requerido
    ejemplo:
      - path: app/api/v1/router.py
        change: Agregar el nuevo router de notificaciones

  patterns:
    tipo: lista de strings
    obligatorio: false
    descripcion: Patrones arquitectonicos y convenciones de codigo a seguir.
    ejemplo:
      - Repository pattern con SQLAlchemy
      - Dependency Injection para el motor de DB
      - Typing estricto con Pydantic v2

  acceptance:
    tipo: lista de strings
    obligatorio: true
    descripcion: Criterios de aceptacion verificables que deben cumplirse.
    reglas:
      - Minimo 2 criterios
      - Deben ser verificables mediante tests o inspeccion
    ejemplo:
      - La migracion se ejecuta sin errores
      - Los tests unitarios del repositorio pasan con 100% de cobertura
      - Se valida la integridad referencial con la tabla de usuarios

  context_files:
    tipo: lista de strings
    obligatorio: true
    descripcion: Archivos de referencia necesarios para ejecutar la tarea.
    ejemplo:
      - technical.yaml
      - docs/architecture.md

  estimated_effort:
    tipo: string
    obligatorio: false
    descripcion: Estimacion de esfuerzo (ej. small, medium, large).
    ejemplo: medium

  stack:
    tipo: string
    obligatorio: false
    descripcion: Stack tecnologico asociado a la tarea.
    ejemplo: python_fastapi

  source_file:
    tipo: string
    obligatorio: false
    descripcion: Archivo fuente de donde proviene la definicion (si aplica).
    ejemplo: feature.yaml

# Reglas generales:
#   - Todo el contenido descriptivo debe estar en ESPANOL
#   - Las claves (keys) deben estar en INGLES
#   - Las rutas de archivos deben ser relativas a la raiz del proyecto

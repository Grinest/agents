# tasks/04_extract_conventions_frontend_nextjs.yaml
task: extract_conventions_frontend_nextjs
level: L3
parent: technical.yaml
status: PENDING
phase: "2 - Convenciones por Stack"

scope: |
  Extraer las convenciones de desarrollo Next.js del agente frontend-nextjs
  de Claude Code a un archivo modular .md que los subagents de Gemini CLI
  puedan importar via @conventions-frontend-nextjs.md.
  Incluir SOLO las secciones relevantes para generacion de specs (arquitectura,
  patrones, anti-patrones). NO incluir secciones de workflow de desarrollo,
  ejemplos de codigo extensos, ni contexto especifico de proyectos.
  El archivo debe ser autocontenido y no depender de otros archivos importados.

files_to_create:
  - gemini/spec-generator/conventions-frontend-nextjs.md

patterns:
  - fuente: plugins/nextjs-development/agents/frontend-nextjs.md
  - secciones_incluir: Technology Stack Expertise (resumido), Architecture Understanding (estructura carpetas), Key Architectural Patterns (Two-layer, Either, Zustand, DataAccess), Anti-Patterns
  - secciones_parciales: Quality Criteria (solo reglas que impactan specs), Testing Strategy (solo estrategia general)
  - secciones_excluir: SOLID Principles (generico), Development Workflow (no relevante), Code examples (no generar codigo), Current Project Context (especifico)
  - formato: markdown con headers claros, listas descriptivas, sin bloques de codigo extensos
  - patron_clave_1: Two-layer Architecture (Domain + Infrastructure)
  - patron_clave_2: DataAccess concreto sin interface (no Repository pattern)
  - patron_clave_3: Either pattern para manejo de errores (Left/Right)
  - patron_clave_4: Zustand stores pequenos y focalizados
  - patron_clave_5: Discriminated union states con campo kind

acceptance:
  - archivo incluye estructura de carpetas Two-layer Architecture
  - archivo documenta DataAccess pattern sin interfaces
  - archivo documenta Either pattern (Left/Right)
  - archivo documenta Zustand stores y discriminated unions
  - archivo documenta anti-patrones prohibidos
  - archivo NO contiene ejemplos de codigo extensos
  - archivo es autocontenido
  - tamano estimado: 150-200 lineas

context_files:
  - plugins/nextjs-development/agents/frontend-nextjs.md
  - docs/features/ai_spec_discovery/fase_1/technical-proposal.md

# tasks/03_extract_conventions_backend_py.yaml
task: extract_conventions_backend_py
level: L3
parent: technical.yaml
status: PENDING
phase: "2 - Convenciones por Stack"

scope: |
  Extraer las convenciones de desarrollo Python/FastAPI del agente backend-py
  de Claude Code a un archivo modular .md que los subagents de Gemini CLI
  puedan importar via @conventions-backend-py.md.
  Incluir SOLO las secciones relevantes para generacion de specs (arquitectura,
  patrones, anti-patrones). NO incluir secciones de workflow de desarrollo,
  ejemplos de codigo extensos, ni contexto especifico del proyecto Voltop.
  El archivo debe ser autocontenido y no depender de otros archivos importados.

files_to_create:
  - gemini/spec-generator/conventions-backend-py.md

patterns:
  - fuente: plugins/python-development/agents/backend-py.md
  - secciones_incluir: Technology Stack Expertise (resumido), Architecture Understanding (estructura carpetas), Key Architectural Patterns (Interactor, Repository ABC, OutputContext, DIP), Anti-Patterns
  - secciones_parciales: Quality Criteria (solo reglas que impactan specs), Testing Strategy (solo estrategia general)
  - secciones_excluir: SOLID Principles (generico), Development Workflow (no relevante), Code examples (no generar codigo), Current Project Context (especifico Voltop)
  - formato: markdown con headers claros, listas descriptivas, sin bloques de codigo extensos
  - patron_clave_1: Clean Architecture 3 capas (domain, application, infrastructure)
  - patron_clave_2: Repository pattern con ABC (interfaces abstractas)
  - patron_clave_3: OutputSuccessContext / OutputErrorContext para respuestas de interactors
  - patron_clave_4: Infrastructure Service Interfaces (DIP para todas las dependencias de infra)
  - patron_clave_5: DTOs Pydantic para validacion de inputs/outputs

acceptance:
  - archivo incluye estructura de carpetas de Clean Architecture 3 capas
  - archivo documenta Repository pattern ABC con descripcion clara
  - archivo documenta OutputSuccessContext/OutputErrorContext
  - archivo documenta anti-patrones prohibidos
  - archivo NO contiene ejemplos de codigo extensos (max 3-5 lineas por patron si es necesario)
  - archivo NO referencia contexto especifico de Voltop
  - archivo es autocontenido (no requiere leer otros archivos para entender las convenciones)
  - tamano estimado: 150-200 lineas

context_files:
  - plugins/python-development/agents/backend-py.md
  - docs/features/ai_spec_discovery/fase_1/technical-proposal.md

# technical.yaml
feature: ai_spec_discovery_fase_1
layer: agent

architecture:
  pattern: Subagent Architecture con .gemini/agents/ y GEMINI.md workspace context
  entry: Ejecucion de Gemini CLI en el directorio gemini/spec-generator/ e invocacion de subagents via @product o @architect
  use_case: Generar especificaciones de producto (feature.yaml) y tecnicas (technical.yaml) en formato SDD estandarizado usando subagents de Gemini CLI con contexto pre-configurado
  interfaces:
    - Subagent @product (.gemini/agents/product.md) con frontmatter YAML para generar feature.yaml
    - Subagent @architect (.gemini/agents/architect.md) con frontmatter YAML para generar technical.yaml
    - GEMINI.md como contexto general del workspace (convenciones compartidas)
    - Archivos modulares .md importados via @file.md para convenciones por stack
    - Schemas de output .yaml como plantillas de formato esperado

pipeline:
  - carga_contexto:
      input: Usuario ejecuta Gemini CLI en el directorio gemini/spec-generator/
      process: Gemini CLI carga automaticamente el GEMINI.md del directorio (contexto general del workspace) y registra los subagents definidos en .gemini/agents/ (product.md y architect.md). Cada subagent tiene su propio system prompt con @imports de convenciones y schemas
      output: Sesion de Gemini CLI con contexto del workspace y subagents @product y @architect disponibles para invocacion

  - invocacion_subagent:
      input: Usuario invoca un subagent con @product o @architect seguido de la descripcion de la tarea
      process: Gemini CLI abre un contexto aislado con el system prompt del subagent seleccionado. El subagent tiene acceso a tools configurados en su frontmatter (read_file, write_file, grep_search). La delegacion puede ser explicita (@nombre) o automatica (el modelo principal decide basandose en el campo description del frontmatter)
      output: Contexto aislado del subagent activo con su prompt especializado, convenciones del stack y schemas de output cargados

  - recopilacion_inputs:
      input: Usuario describe la funcionalidad en lenguaje natural, indica stack tecnologico y opcionalmente referencia un repositorio local
      process: El subagent activo procesa la descripcion del usuario aplicando sus convenciones. Si el usuario indica un repositorio local, Gemini CLI lee la estructura y archivos relevantes para obtener contexto de arquitectura existente
      output: Informacion estructurada lista para generar la especificacion

  - generacion_spec:
      input: Informacion recopilada del usuario + contexto de convenciones del subagent
      process: El subagent genera la especificacion aplicando el schema de output correspondiente (feature.yaml para @product, technical.yaml para @architect) con las convenciones del stack seleccionado
      output: Especificacion completa en formato YAML que el usuario copia a su repositorio bajo docs/features/{feature_name}/

  - validacion_compatibilidad:
      input: Especificacion generada por el subagent de Gemini
      process: El usuario verifica que la especificacion generada es consumible por los agentes de Claude Code (product o architect) sin modificaciones. Opcionalmente, ejecuta el agente Claude Code correspondiente para validar
      output: Especificacion validada y lista para la fase de Delivery con Claude Code

invocation_examples:
  - ejemplo_product_explicito:
      descripcion: Invocacion explicita de @product para generar feature.yaml de una funcionalidad multi-stack
      comando: |
        $ cd gemini/spec-generator/
        $ gemini

        > @product Necesito una spec para un sistema de notificaciones push
          que soporte Firebase Cloud Messaging para Flutter y un endpoint
          de registro de device tokens en el backend Python/FastAPI.
          Stack: multi_stack (python_fastapi + flutter)

  - ejemplo_architect_explicito:
      descripcion: Invocacion explicita de @architect para generar technical.yaml a partir de un feature.yaml existente, con referencia a repositorio local
      comando: |
        $ cd gemini/spec-generator/
        $ gemini

        > @architect Genera el technical.yaml a partir de este feature.yaml:
          @docs/features/push_notifications/feature.yaml
          Stack: python_fastapi
          Repositorio de referencia: /Users/dev/repos/mi-backend/

  - ejemplo_delegacion_automatica:
      descripcion: Delegacion automatica donde Gemini CLI decide que subagent usar basandose en el campo description del frontmatter
      comando: |
        $ cd gemini/spec-generator/
        $ gemini

        > Necesito crear la especificacion de producto para un nuevo modulo
          de pagos con Stripe que incluya checkout, webhooks y reembolsos.

auth:
  gcp_credits: El equipo cuenta con creditos activos en la consola de GCP para consumir Vertex AI
  metodos_autenticacion:
    - adc: Application Default Credentials via gcloud auth application-default login (recomendado para desarrollo local)
    - service_account: Service Account JSON key con rol roles/aiplatform.user (alternativa para entornos sin gcloud)
  nota_api_keys: Vertex AI NO soporta API keys directamente. Las API keys solo funcionan con Google AI Studio (endpoint diferente). Para Vertex AI se requiere ADC o Service Account
  variables_entorno:
    - GOOGLE_CLOUD_PROJECT: ID del proyecto GCP con creditos y API de Vertex AI habilitada
    - GOOGLE_CLOUD_LOCATION: region de Vertex AI (us-central1, la misma del cluster GKE existente)
    - GOOGLE_APPLICATION_CREDENTIALS: ruta al JSON de Service Account (solo si se usa este metodo en lugar de ADC)

dependencies:
  - gemini_cli: Herramienta CLI open-source de Google que ejecuta modelos Gemini desde la terminal con soporte de archivos GEMINI.md para contexto automatico y .gemini/agents/ para subagents especializados
  - vertex_ai: Servicio de Google Cloud Platform para ejecucion de modelos Gemini (Gemini 3.1 Pro por defecto, Gemini 3 Flash como alternativa). Autenticacion via ADC o Service Account (NO API keys). El equipo dispone de creditos GCP activos para cubrir el consumo
  - subagent_product: Subagent definido en .gemini/agents/product.md con frontmatter YAML (name, description, tools, model, temperature). Prompt adaptado del agente product de Claude Code (plugins/general/agents/product.md). Se invoca con @product
  - subagent_architect: Subagent definido en .gemini/agents/architect.md con frontmatter YAML (name, description, tools, model, temperature). Prompt adaptado del agente architect de Claude Code (plugins/general/agents/architect.md). Se invoca con @architect
  - convenciones_backend_py: Convenciones de desarrollo Python/FastAPI extraidas de plugins/python-development/agents/backend-py.md, importadas via @conventions-backend-py.md en los subagents
  - convenciones_frontend_nextjs: Convenciones de desarrollo Next.js extraidas de plugins/nextjs-development/agents/frontend-nextjs.md, importadas via @conventions-frontend-nextjs.md en los subagents
  - convenciones_mobile_flutter: Convenciones de desarrollo Flutter extraidas de plugins/flutter-development/agents/mobile-flutter.md, importadas via @conventions-mobile-flutter.md en los subagents
  - gcloud_cli: Herramienta de linea de comandos de Google Cloud para autenticacion ADC (gcloud auth application-default login) y habilitacion de APIs
